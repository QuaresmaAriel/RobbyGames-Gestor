<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Serviço - Gestor</title>

    <script>
        (function() {
            const darkMode = localStorage.getItem('darkMode') === 'true';
            const fontSize = localStorage.getItem('fontSize') || '16px';
            if (darkMode) {
                document.documentElement.classList.add('dark-mode');
            } else {
                document.documentElement.classList.remove('dark-mode');
            }
            document.documentElement.style.fontSize = fontSize;
        })();
    </script>

    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
</head>
<body>
    <div class="form-container">
        <header class="form-header">
            <a href="dashboard.html" class="btn-back">← Voltar</a>
            <h2>Cadastrar Serviço (OS)</h2>
        </header>

        <form id="form-servico">
            <div class="input-group">
                <label>Nome do Cliente</label>
                <input type="text" id="cliente-nome" placeholder="Ex: Bruce Wayne">
            </div>

            <div class="grid-2-col">
                <div class="input-group">
                    <label>Nº da OS</label>
                    <input type="text" id="os-numero" placeholder="001">
                </div>
                <div class="input-group">
                    <label>Aparelho</label>
                    <input type="text" id="aparelho" placeholder="Ex: Bat-Phone">
                </div>
            </div>

            <div class="input-group">
                <label>Problema Relatado</label>
                <textarea id="problema" rows="3" placeholder="Descreva o defeito..."></textarea>
            </div>

            <div class="input-group">
                <label>Orçamento (R$)</label>
                <input type="number" id="orcamento" placeholder="0,00">
            </div>

            <button type="submit" class="btn-save">Incluir na Fila</button>
        </form>
    </div>
    <script type="module" src="js/formularios.js">
    </script>
</body>
</html>
